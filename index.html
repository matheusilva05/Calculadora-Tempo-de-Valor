<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculador de Tempo</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>

    <div class="container">
        <h1>💸 Calculador de Tempo de Vida</h1>

        <label>Quanto você recebe ao mês?</label>
        <input type="number" id="salario" placeholder="Ex: 1800">

        <label>Valor do produto que queira comprar?</label>
        <input type="number" id="Produto" placeholder="Ex: 300">

        <button id="calcular">Calcular</button>

        <p id="resultado"></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
